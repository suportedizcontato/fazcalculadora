<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Calculator body (white filled) -->
  <rect x="50" y="32" width="80" height="116" rx="12" fill="white"/>
  <!-- Display (blue) -->
  <rect x="62" y="44" width="56" height="32" rx="6" fill="#2563EB"/>
  <!-- 3x3 button grid -->
  <!-- Row 1 -->
  <rect x="62" y="86" width="14" height="12" rx="3" fill="#2563EB"/>
  <rect x="83" y="86" width="14" height="12" rx="3" fill="#2563EB"/>
  <rect x="104" y="86" width="14" height="12" rx="3" fill="#0EA5E9"/>
  <!-- Row 2 -->
  <rect x="62" y="103" width="14" height="12" rx="3" fill="#2563EB"/>
  <rect x="83" y="103" width="14" height="12" rx="3" fill="#2563EB"/>
  <rect x="104" y="103" width="14" height="12" rx="3" fill="#0EA5E9"/>
  <!-- Row 3: 0 wide + enter key -->
  <rect x="62" y="120" width="35" height="12" rx="3" fill="#2563EB"/>
  <rect x="104" y="120" width="14" height="12" rx="3" fill="#0EA5E9"/>
</svg>
